name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Init buildozer.spec (if not present)
        run: |
          pip install --user buildozer cython
          if [ ! -f buildozer.spec ]; then
            buildozer init
            sed -i 's/package.name = myapp/package.name = fletcalc/' buildozer.spec
            sed -i 's/package.domain = org.test/package.domain = org.fletcalc/' buildozer.spec
            sed -i 's/# requirements = sqlite3,kivy/requirements = python3,kivy/' buildozer.spec
          fi

      - name: Build with buildozer-action
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
          buildozer_version: stable

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculator-apk
          path: bin/*.apk
