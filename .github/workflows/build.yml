- name: Install Buildozer
        run: pip install --user --upgrade buildozer cython virtualenv

      - name: Prepare buildozer.spec
        run: |
          if [ ! -f buildozer.spec ]; then
            buildozer init
            sed -i 's/package.name = myapp/package.name = fletcalc/' buildozer.spec
            sed -i 's/package.domain = org.test/package.domain = org.fletcalc/' buildozer.spec
            sed -i 's/# requirements = sqlite3,kivy/requirements = python3,kivy/' buildozer.spec
          fi

      - name: Pre-download Android SDK components
        run: |
          # Скачиваем cmdline-tools, если ещё нет
          mkdir -p $HOME/.buildozer/android/platform
          cd $HOME/.buildozer/android/platform
          if [ ! -d "android-sdk" ]; then
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
            unzip -q cmdline-tools.zip -d android-sdk/cmdline-tools
            mv android-sdk/cmdline-tools/cmdline-tools android-sdk/cmdline-tools/latest
          fi
          yes | android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=android-sdk --licenses > /dev/null
          android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=android-sdk \
            "platform-tools" \
            "build-tools;34.0.0" \
            "platforms;android-34"

      - name: Build with Buildozer
        run: buildozer -v android debug
